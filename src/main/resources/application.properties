spring.application.name=interview-coach

server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/interview_coach}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:interview_coach}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:interview_coach}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.sql.init.mode=never

logging.level.root=INFO
logging.level.interview.coach=INFO
logging.file.name=${LOGGING_FILE_NAME:/var/log/interview-coach/app.log}
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.prometheus.access=UNRESTRICTED
management.prometheus.metrics.export.enabled=true
management.tracing.sampling.probability=${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.tracing.transport=http

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:change-me-change-me-change-me-change-me-change-me-123456}
app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:interview-coach}
app.security.jwt.access-token-minutes=${APP_SECURITY_JWT_ACCESS_TOKEN_MINUTES:15}
app.security.jwt.refresh-token-days=${APP_SECURITY_JWT_REFRESH_TOKEN_DAYS:7}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://172.20.0.2:5173/,http://localhost:5173}

app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:andberezutsky@gmail.com}
app.mail.password-reset-subject=${APP_MAIL_PASSWORD_RESET_SUBJECT:Interview Coach password reset}
app.mail.email-verification-subject=${APP_MAIL_EMAIL_VERIFICATION_SUBJECT:Interview Coach email verification}
app.frontend.password-reset-url=${APP_FRONTEND_PASSWORD_RESET_URL:http://localhost:5173/reset-password}

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:andberezutsky@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:wphirqbgvajbosgl}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

app.security.email-verification.expiration-minutes=${APP_SECURITY_EMAIL_VERIFICATION_EXPIRATION_MINUTES:15}
app.security.email-verification.max-attempts=${APP_SECURITY_EMAIL_VERIFICATION_MAX_ATTEMPTS:5}

app.assessment.enabled=${APP_ASSESSMENT_ENABLED:false}
app.assessment.base-url=${APP_ASSESSMENT_BASE_URL:http://127.0.0.1:8000}
app.assessment.client-id=${APP_ASSESSMENT_CLIENT_ID:main-backend}
app.assessment.mode=${APP_ASSESSMENT_MODE:sync}
app.assessment.question-limit=${APP_ASSESSMENT_QUESTION_LIMIT:10}
app.assessment.report-language=${APP_ASSESSMENT_REPORT_LANGUAGE:ru}
app.assessment.subscription-plan=${APP_ASSESSMENT_SUBSCRIPTION_PLAN:start}
