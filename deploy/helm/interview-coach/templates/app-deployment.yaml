apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "interview-coach.fullname" . }}
  labels:
    {{- include "interview-coach.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "interview-coach.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "interview-coach.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.service.port }}
          envFrom:
            - configMapRef:
                name: {{ include "interview-coach.appConfigName" . }}
            - secretRef:
                name: {{ include "interview-coach.appSecretName" . }}
          readinessProbe:
            httpGet:
              path: {{ .Values.app.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.app.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
