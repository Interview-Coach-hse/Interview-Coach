apiVersion: v1
kind: Service
metadata:
  name: {{ include "interview-coach.fullname" . }}
  labels:
    {{- include "interview-coach.labels" . | nindent 4 }}
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "interview-coach.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
