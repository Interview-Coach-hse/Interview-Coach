services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-coach-postgres
    environment:
      POSTGRES_DB: interview_coach
      POSTGRES_USER: interview_coach
      POSTGRES_PASSWORD: interview_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview-coach-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      APP_SECURITY_JWT_SECRET: change-me-change-me-change-me-change-me-change-me-123456
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/interview_coach
      SPRING_DATASOURCE_USERNAME: interview_coach
      SPRING_DATASOURCE_PASSWORD: interview_coach
      APP_ASSESSMENT_ENABLED: ${APP_ASSESSMENT_ENABLED:-false}
      APP_ASSESSMENT_BASE_URL: ${APP_ASSESSMENT_BASE_URL:-http://localhost:8000}
      APP_ASSESSMENT_CLIENT_ID: ${APP_ASSESSMENT_CLIENT_ID:-main-backend}
      APP_ASSESSMENT_MODE: ${APP_ASSESSMENT_MODE:-sync}
      APP_ASSESSMENT_QUESTION_LIMIT: ${APP_ASSESSMENT_QUESTION_LIMIT:-30}
      APP_ASSESSMENT_REPORT_LANGUAGE: ${APP_ASSESSMENT_REPORT_LANGUAGE:-ru}
      APP_ASSESSMENT_SUBSCRIPTION_PLAN: ${APP_ASSESSMENT_SUBSCRIPTION_PLAN:-start}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
